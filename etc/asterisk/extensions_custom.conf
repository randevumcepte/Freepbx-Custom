[from-internal]

exten => 33,1,Goto(polly-simple,s,1)
exten => 1,1,NoOp(Randevu hatırlatma çağrısı başlıyor)
exten => 1,n,Set(__randevuid=${randevuid})
exten => 1,n,Set(__calinacakKayit=${myMessage})
exten => 1,n,Set(__operatorKanali=${kuyruk})

exten => 1,n,Goto(randevu-hatirlatma,s,1)
exten => 1,n,Hangup()

; **Alacak hatırlatma çağrısını başlat**
exten => 2,1,NoOp(Alacak hatırlatma çağrısı başlatılıyor)
exten => 2,n,Set(__alacakIdler=${alacaklar})
exten => 2,n,Set(__calinacakKayit=${myMessage})
exten => 2,n,Set(__operatorKanali=${kuyruk})
exten => 2,n,Goto(alacak-hatirlatma,s,1)
exten => 2,n,Hangup()

; kampanya tanıtım bölümü eczella

exten => 3,1,NoOp(Kampanya Tanıtım çağrısı eczella)
exten => 3,n,Set(__kampanyaKatilimciId=${katilimci})
exten => 3,n,Set(__etkinlikRandevuTarihi=${etkinlikRandevuTarihi})
exten => 3,n,Set(__kampanyaHizmetId=${kampanyaHizmetId})
exten => 3,n,Set(__kampanyaUrunId=${kampanyaUrunId})
exten => 3,n,Set(__calinacakKayit=${myMessage})
exten => 3,n,Set(__operatorKanali=${kuyruk})
exten => 3,n,Goto(kampanya-tanitimyeni,s,1)
exten => 3,n,Hangup()

; kuaförler odası anket
exten => 6,1,NoOp(Kuaförler odası anket)
exten => 6,n,Set(__kampanyaKatilimciId=${katilimci})
exten => 6,n,Set(__etkinlikRandevuTarihi=${etkinlikRandevuTarihi})
exten => 6,n,Set(__kampanyaHizmetId=${kampanyaHizmetId})
exten => 6,n,Set(__kampanyaUrunId=${kampanyaUrunId})
exten => 6,n,Set(__calinacakKayit=${myMessage})
exten => 6,n,Set(__operatorKanali=${kuyruk})
exten => 6,n,Set(__yanitla=${yanitla})
exten => 6,n,GotoIf($["${myMessage}"=""]?baskan-msg,s,1)
exten => 6,n,GotoIf($["${yanitla}"=""]?kuaforler-odasi-bilgilendirme,s,1)
exten => 6,n,Goto(kuaforler-odasi-anket,s,1) 

; Hangup burada olmamalı, çünkü GotoIf veya Goto zaten çağrıyı yönlendiriyor
; exten => 6,n,Hangup() ; Bu satırı silin veya yorum satırı yapın

[baskan-msg]
exten => s,1,NoOp(Başkanın mesajını çal)
exten => s,n,ExecIf($["${kampanyaKatilimciId}" != ""]?AGI(/var/lib/asterisk/agi-bin/ulasildiEczane.php,${randevuid},${alacakIdler},${kampanyaKatilimciId}))
exten => s,n,Playback(/var/lib/asterisk/sounds/custom/secim)
exten => s,n,Hangup()


; ilaç rapor hatırlatma  bölümü eczella

exten => 5,1,NoOp(Kampanya Tanıtım çağrısı eczella)
exten => 5,n,Set(__kampanyaKatilimciId=${katilimci})
exten => 5,n,Set(__etkinlikRandevuTarihi=${etkinlikRandevuTarihi})
exten => 5,n,Set(__kampanyaHizmetId=${kampanyaHizmetId})
exten => 5,n,Set(__kampanyaUrunId=${kampanyaUrunId})
exten => 5,n,Set(__calinacakKayit=${myMessage})
exten => 5,n,Set(__operatorKanali=${kuyruk})
exten => 5,n,Goto(ilac-hatirlatma-eczane,s,1)
exten => 5,n,Goto(kampanya-tanitimyeni,s,1)
exten => 5,n,Hangup()


; kampanya tanıtım bölümü randevumcepte

exten => 4,1,NoOp(Kampanya Tanıtım çağrısı randevumcepte)
exten => 4,n,Set(__kampanyaKatilimciId=${katilimci})
exten => 4,n,Set(__calinacakKayit=${myMessage})
exten => 4,n,Set(__operatorKanali=${kuyruk})
;exten => 3,n,Goto(kampanya-tanitim,s,1)

exten => 4,n,Goto(kampanya-tanitim,s,1)
 
exten => 4,n,Hangup()

;exten => h,1,NoOp(Çağrı tamamlandı, son durum: ${DIALSTATUS})
;exten => h,n,ExecIf($["${DIALSTATUS}"="NOANSWER"]?AGI(/var/lib/asterisk/agi-bin/ulasilamadi.php,${randevuid},${alacakIdler}))
;exten => h,n,ExecIf($["${DIALSTATUS}"="BUSY"]?AGI(/var/lib/asterisk/agi-bin/ulasilamadi.php,${randevuid},${alacakIdler}))
;exten => h,n,Hangup()
;exten => t,1,NoOp(Çağrı zaman aşımına uğradı)
;exten => t,n,AGI(/var/lib/asterisk/agi-bin/ulasilamadi.php,"",${alacakIdler})
