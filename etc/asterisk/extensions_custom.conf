; **Çağrı Açıldığında Alacak Hatırlatma Başlasın**
[alacak-cevapladi]
exten => s,1,NoOp(Çağrı Açıldı, Alacak Hatırlatma Başlatılıyor)
exten => s,n,Gosub(alacak-hatirlatma,s,1)
;same => n,Return() ; Çağrının tekrar başlamasını önler
exten => s,n,Hangup()  ; Eğer çağrı bu noktaya kadar geldiyse, tamamen kapansın

; **Alacak Hatırlatma Menüsü**
[alacak-hatirlatma]
exten => s,1,NoOp(Alacak Hatırlatma Başladı)
exten => s,n,Answer()
exten => s,n,AGI(/var/lib/asterisk/agi-bin/ulasildi.php,${randevuid},${alacakIdler})
exten => s,n,AGI(/var/lib/asterisk/agi-bin/pollysimple.php,${calinacakKayit})
exten => s,n,Background(/var/spool/asterisk/monitor/polly-${UNIQUE_ID})
exten => s,n,WaitExten(5)
;exten => s,n,GotoIf($["${EXTEN}"="1"]?odeme_islemi)
;exten => s,n,GotoIf($["${EXTEN}"="2"]?operator)
;exten => s,n,GotoIf($["${EXTEN}"=""]?hangup_call)

exten => t,1,NoOp(Tuşlama yapılmadı, çağrı sonlandırılıyor)
exten => t,n,Hangup()

; Kullanıcı tuşlama yaparsa
exten => 1,1,NoOp(Kullanıcı 1'e bastı - Ödeme yapılacak)
exten => 1,n,AGI(/var/lib/asterisk/agi-bin/alacakodenecek.php,${alacakIdler})
exten => 1,n,NoOp(Agi status ${AGI_STATUS})
exten => 1,n,GotoIf($["${AGI_STATUS}"="success"]?success:failure)

exten => 1,n(success),NoOp(Ödeme başarılı)
exten => 1,n,Set(ENCODED_DATA=${SHELL(echo -n 'Ödeme yapacağınıza dair bildiriminiz tarafımıza başarıyla ulaşmıştır. Sağlıklı günler dileriz.' | base64)})

exten => 1,n(success),AGI(/var/lib/asterisk/agi-bin/pollysimple.php,${ENCODED_DATA})
exten => 1,n(success),Background(/var/spool/asterisk/monitor/polly-${UNIQUE_ID})
exten => 1,n(success),Hangup()

exten => 1,n(failure),NoOp(Ödeme başarısız)
exten => 1,n,Set(ENCODED_DATA=${SHELL(echo -n 'Şu an sistemde bir sorun mevcut. Sizi operatöre aktarıyorum' | base64)})
exten => 1,n(failure),AGI(/var/lib/asterisk/agi-bin/pollysimple.php,${ENCODED_DATA})
exten => 1,n(failure),Background(/var/spool/asterisk/monitor/polly-${UNIQUE_ID})
exten => 1,n(failure),Dial(PJSIP/31)
exten => 1,n(failure),Hangup()

exten => 2,1,NoOp(Operatöre bağlanıyor)
exten => 2,n,AGI(/var/lib/asterisk/agi-bin/pollysimple.php,Sizi operatöre aktarıyorum)
exten => 2,n,Queue(${operatorKanali},t)
exten => 2,n,Hangup()


