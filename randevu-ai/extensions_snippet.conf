; ============================================================================
; randevu-ai — dialplan entegrasyonu (extensions_custom.conf'a eklenecek / mevcutla ayni)
; ============================================================================
; [sesli-asistan] context'i extensions_custom.conf'ta ZATEN var. Yeni AI akisini
; TEK BIR TEST DID'inde denemek icin, did_contexts tablosunda o DID'in context'ini
; 'sesli-asistan' yap (karsilamaRouter.php buna gore yonlendirir). Digerleri
; 'from-trunk-custom' (eski IVR) kalmaya devam eder — kademeli gecis.
;
; Stasis uygulamasi (Node: npm start) baglanmazsa 'failed' dalina dusulur ve
; eski IVR devreye girer — yani AI ayakta degilse musteri yine hizmet alir.

[sesli-asistan]
exten => s,1,NoOp(=== randevu-ai Sesli Asistan ===)
 same => n,Answer()
 same => n,Set(CHANNEL(language)=tr)
 same => n,Stasis(randevu_ai,${CALLERID(num)},${FROM_DID})
 same => n,Goto(sesli-asistan,failed,1)     ; Stasis normal biterse (app yok/cikti) fallback

exten => failed,1,NoOp(randevu-ai yok/hata -> eski IVR)
 same => n,Goto(from-trunk-custom,s,1)
 same => n,Hangup()

; Deploy sonrasi:  asterisk -rx "dialplan reload"
; Node servisi:    pm2 start src/server.js --name randevu-ai   (ecosystem onerilir)
